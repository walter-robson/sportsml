services:
  postgres:
    image: postgres:16-alpine
    container_name: sportsml-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sportsml
      POSTGRES_PASSWORD: sportsml
      POSTGRES_DB: sportsml
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsml -d sportsml"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: sportsml-api
    ports:
      - "8000:8000"
    environment:
      SPORTSML_DATA_DIR: /app/data
      SPORTSML_DUCKDB_PATH: /app/data/sportsml.duckdb
      SPORTSML_TENANT_ID: demo
      SPORTSML_DEFAULT_SPORT: basketball.nba
      SPORTSML_DATABASE_URL: postgresql+psycopg://sportsml:sportsml@postgres:5432/sportsml
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  workbench:
    build:
      context: .
      dockerfile: docker/workbench.Dockerfile
    container_name: sportsml-workbench
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  dagster:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    container_name: sportsml-dagster
    ports:
      - "3001:3001"
    environment:
      DAGSTER_HOME: /app/.dagster_home
      SPORTSML_DATA_DIR: /app/data
      SPORTSML_DUCKDB_PATH: /app/data/sportsml.duckdb
    volumes:
      - ./data:/app/data
      - ./.dagster_home:/app/.dagster_home

volumes:
  postgres_data:
