name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  python-lint:
    name: Python · lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/install_dev_paths.py
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  python-typecheck:
    name: Python · mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python scripts/install_dev_paths.py
      - name: Mypy
        run: mypy packages/core/sportsml packages/api/sportsml_api

  python-test:
    name: Python · pytest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install diff-cover
          python scripts/install_dev_paths.py
      - name: Pytest with coverage
        run: |
          pytest --cov --cov-report=xml --cov-report=term-missing
      - name: Enforce patch coverage >= 80% on changed lines
        if: github.event_name == 'pull_request'
        # Soft-fail during initial bootstrap: format-only reflows count as
        # uncovered "new" lines. Flip to a hard fail after the next real-logic
        # PR proves the gate works. Tracked separately.
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-lint:
    name: Workbench · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/workbench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/workbench/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Workbench · tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/workbench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/workbench/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-build:
    name: Workbench · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/workbench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/workbench/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: pre-commit/action@v3.0.1
